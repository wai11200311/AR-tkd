<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AR Taekwondo Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="layar-mulai" class="layar-penuh">
        <h2>Mulai Eksplorasi AR</h2>
        <p>Arahkan kamera ke marker Hiro</p>
        <button id="tombol-mulai">START</button>
    </div>

    <div id="panel-sabuk" class="tersembunyi">
        <h2 id="judul-sabuk"></h2>
        <p id="arti-sabuk"></p>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-assets>
            <audio id="audioSejarah" src="audio.mp3" preload="auto"></audio>
        </a-assets>

        <a-marker preset="hiro" id="marker">
            <a-entity gltf-model="scene.gltf" 
                      scale="0.005 0.005 0.005" 
                      position="0 0 0" 
                      animation="property: rotation; from: -90 0 0; to: -90 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>
            
            <a-torus id="visualSabuk" visible="false" color="#FFFFFF" radius="0.5" tube="0.08" scale="1 0.1 1" position="0 0.3 0" rotation="90 0 0"></a-torus>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script src="script.js"></script>
</body>
</html>
